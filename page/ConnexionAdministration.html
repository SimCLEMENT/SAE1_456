<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="../image/pouce-en-lair.png">
</head>

<body>
  <h1 class="text-center mt-4">Page de connexion pour les Administrations</h1>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6 p-4">
        <div class="card card-login">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <h5 class="card-title mb-0">Connexion</h5>
              <small class="text-muted">Entrez vos identifiants</small>
            </div>
            <form id="loginForm" novalidate>
              <div class="mb-3 form-floating">
                <input type="text" class="form-control" id="username" placeholder="Identifiant" required>
                <label for="username">Identifiant</label>
                <div class="invalid-feedback">Veuillez entrer votre identifiant.</div>
              </div>
              <div class="mb-2 form-floating position-relative">
                <input type="password" class="form-control" id="password" placeholder="Mot de passe" required>
                <label for="password">Mot de passe</label>
                <span class="position-absolute top-50 end-0 translate-middle-y pe-3 show-pass-btn"
                      id="togglePass" title="Afficher/masquer">
                </span>
                <div class="invalid-feedback">Veuillez entrer votre mot de passe.</div>
              </div>
              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-lg btn-primary" id="loginBtn">
                  <i class="bi bi-box-arrow-in-right me-2"></i>Connexion
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <footer class="bg-dark text-white pt-3 pb-3 mt-5 fixed-bottom">
            <div class="container">
                
                <div class="d-flex justify-content-between align-items-center">
                    
                    <div class="text-start">
                        <p class="mb-0">
                            Développé par : <strong class="text-info">CLEMENT Simon</strong>
                        </p>
                    </div>
                    
                    <div class="text-end">
                        <p class="mb-0">
                            Pour le groupe : <strong class="text-warning">D</strong>
                        </p>
                    </div>
                    
                </div>
                
                <hr class="my-2 bg-secondary">
                
                <div class="text-center">
                    <p class="mb-0 text-white small">
                        &copy; 2025 Tous droits réservés. | Mentions Légales
                    </p>
                </div>
                
            </div>
        </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (username && password) {
        window.location.href = 'PageAdministrationLisieux.html';
      } else {
        if (!username) document.getElementById('username').classList.add('is-invalid');
        if (!password) document.getElementById('password').classList.add('is-invalid');
      }
    });
  </script>
</body>
</html>
